<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanga Arnold Lukoda - 3D Portfolio</title>
  
  <link
    rel="stylesheet"
    href="https://use.fontawesome.com/releases/v5.8.2/css/all.css"
    integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay"
    crossorigin="anonymous"
  />
  <link
    href="https://fonts.googleapis.com/css?family=Poppins:200i,300,400&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css?family=Raleway:700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* Custom properties/variables  */
    :root {
      --main-white: white;
      --main-yellow: #FFDB58;
      --main-blue: blue;
      --main-gray: grey;
    }

    /* Base reset */
    * {
      margin: 0;
      padding: 0;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    html {
      box-sizing: border-box;
      font-size: 62.5%;
      scroll-behavior: smooth;
    }

    @media (max-width: 75em) { html { font-size: 60%; } }
    @media (max-width: 61.25em) { html { font-size: 58%; } }
    @media (max-width: 28.75em) { html { font-size: 55%; } }

    body {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--main-white);
      background-color: #181719;
      overflow-x: hidden;
    }

    h1, h2 {
      font-family: 'Raleway', sans-serif;
      font-weight: 700;
      text-align: center;
    }

    h1 { font-size: 6rem; }
    h2 { font-size: 4.2rem; }
    ul { list-style: none; }
    a { text-decoration: none; color: var(--main-white); }

    /* Nav */
    .nav {
      display: flex;
      justify-content: flex-end;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: var(--main-yellow);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .nav-list {
      display: flex;
      margin-right: 2rem;
    }

    @media (max-width: 28.75em) {
      .nav { justify-content: center; }
      .nav-list { margin: 0 1rem; }
    }

    .nav-list a {
      display: block;
      font-size: 2.2rem;
      padding: 2rem;
      color: #000;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }

    .nav-list a:hover {
      background: var(--main-blue);
      color: var(--main-white);
    }

    /* Welcome section with 3.js Canvas background */
    .welcome-section {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none; /* Allows scrolling over the canvas */
    }

    .welcome-content {
      position: relative;
      z-index: 2;
      text-align: center;
      pointer-events: auto;
      text-shadow: 0 4px 10px rgba(0,0,0,0.7);
    }

    .welcome-section h1 {
      font-size: 6.5rem;
      margin-bottom: 1rem;
    }

    .welcome-section > .welcome-content > p {
      font-size: 3rem;
      font-weight: 200;
      font-style: italic;
      color: var(--main-yellow);
    }

    /* Contact section */
    .contact-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
      height: 80vh;
      padding: 0 2rem;
      background: var(--main-gray);
      position: relative;
      z-index: 2;
    }

    .contact-section-header > h2 { font-size: 6rem; }
    @media (max-width: 28.75em) { .contact-section-header > h2 { font-size: 4rem; } }
    .contact-section-header > p { font-style: italic; }

    .contact-links {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 980px;
      margin-top: 4rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      border-radius: 2px;
    }

    .contact-details {
      font-size: 2.4rem;
      text-shadow: 2px 2px 1px #1f1f1f;
      transition: transform 0.3s ease-out;
    }

    .contact-details:hover {
      transform: translateY(8px);
      color: var(--main-yellow);
    }

    /* Footer */
    footer {
      font-weight: 300;
      display: flex;
      justify-content: space-evenly;
      padding: 2rem;
      background: var(--main-gray);
      border-top: 4px solid var(--main-yellow);
      position: relative;
      z-index: 2;
    }

    footer > p { margin: 2rem; }
    footer i { vertical-align: middle; }
    footer a:hover { color: var(--main-yellow); }

    @media (max-width: 28.75em) {
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <nav id="navbar" class="nav">
    <ul class="nav-list">
      <li><a href="#welcome-section">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="welcome-section" class="welcome-section">
    <canvas id="three-canvas"></canvas>
    <div class="welcome-content">
      <h1>Sanga Arnold Lukoda</h1>
      <p>a web developer</p>
    </div>
  </section>

  <section id="contact" class="contact-section">
    <div class="contact-section-header">
      <h2>Let's connect...</h2>
    </div>
    <div class="contact-links">
      <a href="mailto:sangarnold@gmail.com" class="btn contact-details">
        <i class="fas fa-at"></i> Send a mail
      </a>
      <a href="tel:+256-751-798367" class="btn contact-details">
        <i class="fas fa-mobile-alt"></i> Call me
      </a>
    </div>
  </section>

  <footer>
    <p>
      &copy; Created by
      <a href="https://news.mak.ac.ug/2023/02/cocis-presents-overall-best-science-student-at-the-mak-73rd-graduation/" target="_blank">Sanga</a>
    </p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // --- Three.js Setup ---
    const canvas = document.querySelector('#three-canvas');
    const scene = new THREE.Scene();
    
    // Add a dark space background color matching your linear gradient concept
    scene.background = new THREE.Color('#131314');

    // Camera Configuration
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // --- Lights ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xFFDB58, 1.5); // Styled with your --main-yellow
    directionalLight.position.set(2, 2, 4);
    scene.add(directionalLight);

    // --- 3D Objects Mesh Grid ---
    // Floating Mesh 1: Torus (Yellow Wireframe Theme)
    const geoTorus = new THREE.TorusGeometry(1, 0.3, 16, 100);
    const matTorus = new THREE.MeshStandardMaterial({ color: 0xffdb58, wireframe: true });
    const torus = new THREE.Mesh(geoTorus, matTorus);
    torus.position.set(-2.5, 1, 0);
    scene.add(torus);

    // Floating Mesh 2: Octahedron (Blue Theme)
    const geoOcta = new THREE.OctahedronGeometry(0.8);
    const matOcta = new THREE.MeshStandardMaterial({ color: 0x0000ff, roughness: 0.4 });
    const octa = new THREE.Mesh(geoOcta, matOcta);
    octa.position.set(2.5, -1, 0);
    scene.add(octa);

    // --- Particle Field Background ---
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 400;
    const posArray = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 12; // Spread across view
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.03,
      color: 0xffffff,
      transparent: true,
      opacity: 0.8
    });
    const starField = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(starField);

    // --- Interactive Mouse Movement ---
    let mouseX = 0;
    let mouseY = 0;
    
    window.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX / window.innerWidth) - 0.5;
      mouseY = (event.clientY / window.innerHeight) - 0.5;
    });

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    const animate = () => {
      const elapsedTime = clock.getElapsedTime();

      // Rotate objects independently
      torus.rotation.x = elapsedTime * 0.4;
      torus.rotation.y = elapsedTime * 0.2;

      octa.rotation.x = -elapsedTime * 0.3;
      octa.rotation.y = elapsedTime * 0.5;

      // Subtle parallax effect tracking mouse coordinates
      scene.position.x = mouseX * 0.8;
      scene.position.y = -mouseY * 0.8;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    };

    animate();

    // --- Window Responsive Handling ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
